<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Groupie Tracker</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/search.css">
    <link rel="stylesheet" href="/static/css/filter.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>GROUPIE TRACKER</h1>
            <p>Discover Artists and Their Concert History</p>
            
            <!-- Search form -->
            <form class="search-form" action="/search" method="GET">
                <div class="search-container">
                    <input type="text" 
                           class="search-input"
                           name="q" 
                           placeholder="Search artists, members, locations..."
                           autocomplete="off">
                    <div class="search-suggestions">
                        <div class="suggestions-list"></div>
                    </div>
                </div>
            </form>

            <!-- FILTER PANEL -->
            <div class="filter-panel">
                <div class="filter-header">
                    <h2>Filters</h2>
                    <button class="filter-toggle">Show Filters</button>
                </div>
                
                <div class="filter-content">
                    <!-- Creation Date Range Filter -->
                    <div class="filter-group">
                        <h3>Creation Date</h3>
                        <div class="range-filter">
                            <input type="range" id="creationDateStart" min="1950" max="2024" value="1950">
                            <input type="range" id="creationDateEnd" min="1950" max="2024" value="2024">
                            <div class="range-values">
                                <span id="creationStartValue">1950</span> - 
                                <span id="creationEndValue">2024</span>
                            </div>
                        </div>
                    </div>
            
                    <!-- First Album Date Range Filter -->
                    <div class="filter-group">
                        <h3>First Album Year</h3>
                        <div class="range-filter">
                            <input type="range" id="firstAlbumStart" min="1950" max="2024" value="1950">
                            <input type="range" id="firstAlbumEnd" min="1950" max="2024" value="2024">
                            <div class="range-values">
                                <span id="albumStartValue">1950</span> - 
                                <span id="albumEndValue">2024</span>
                            </div>
                        </div>
                    </div>
            
                    <!-- Members Filter -->
                    <div class="filter-group">
                        <h3>Number of Members</h3>
                        <div class="checkbox-group" id="memberFilter">
                            <label><input type="checkbox" name="members" value="1">1</label>
                            <label><input type="checkbox" name="members" value="2">2</label>
                            <label><input type="checkbox" name="members" value="3">3</label>
                            <label><input type="checkbox" name="members" value="4">4</label>
                            <label><input type="checkbox" name="members" value="5">5</label>
                            <label><input type="checkbox" name="members" value="6">6</label>
                            <label><input type="checkbox" name="members" value="7">7</label>
                            <label><input type="checkbox" name="members" value="8+">8+</label>
                        </div>
                    </div>
            
                    <!-- Locations Filter -->
                    <div class="filter-group">
                        <h3>Concert Locations</h3>
                        <div class="location-filter">
                            <select id="locationFilter" class="scrollable" multiple>
                                <!-- Will be populated dynamically by JavaScript -->
                            </select>
                        </div>
                    </div>
            
                    <!-- Filter Actions -->
                    <div class="filter-actions">
                        <button id="applyFilters" class="filter-button apply">Apply Filters</button>
                        <button id="resetFilters" class="filter-button reset">Reset</button>
                    </div>
            
                    <!-- Results Count -->
                    <div class="results-count">
                        Showing <span id="resultCount">0</span> results
                    </div>
                </div>
            </div>
    
        </header>
    </div>

    <main>
        <div class="artists-grid">
            {{range .}}
            <div class="artist-card">
                <a href="/artist?id={{.ID}}" class="artist-link">
                    <div class="image-container">
                        <img src="{{.Image}}" alt="{{.Name}}" loading="lazy">
                    </div>
                    <div class="artist-info">
                        <h2>{{.Name}}</h2>
                    </div>
                </a>
            </div>
            {{end}}
        </div>
    </main>

    <footer>
        <p>© 2024 Groupie Tracker. All rights reserved.</p>
    </footer>

    <!-- Scripts -->
    <script src="/static/js/main.js"></script>
    <script src="/static/js/search.js"></script>
    <script src="/static/js/filter.js"></script>
</body>
</html>
