<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Groupie Tracker</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/search.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>GROUPIE TRACKER</h1>
            <p>Discover Artists and Their Concert History</p>
            
            <!-- Search form with live suggestions -->
            <form class="search-form" action="/search" method="GET">
                <div class="search-container">
                    <input type="text" 
                           class="search-input"
                           name="q" 
                           placeholder="Search artists, members, locations..."
                           autocomplete="off">
                    <div class="search-suggestions">
                        <div class="suggestions-list"></div>
                    </div>
                </div>
            </form>
            <div class="filter-panel">
                <div class="filter-section">
                    <label>
                        Creation Year: <span id="creationYearDisplay">1960-2024</span>
                        <input type="range" id="creationYearMin" min="1960" max="2024" value="1960">
                        <input type="range" id="creationYearMax" min="1960" max="2024" value="2024">
                    </label>
                    
                    <label>
                        First Album: <span id="albumYearDisplay">1960-2024</span>
                        <input type="range" id="albumYearMin" min="1960" max="2024" value="1960">
                        <input type="range" id="albumYearMax" min="1960" max="2024" value="2024">
                    </label>
                </div>
            
                <div class="filter-section members">
                    <span>Members:</span>
                    <div class="members-grid">
                        <label><input type="checkbox" value="1">1</label>
                        <label><input type="checkbox" value="2">2</label>
                        <label><input type="checkbox" value="3">3</label>
                        <label><input type="checkbox" value="4">4</label>
                        <label><input type="checkbox" value="5">5</label>
                        <label><input type="checkbox" value="6">6</label>
                        <label><input type="checkbox" value="7">7</label>
                        <label><input type="checkbox" value="8">8</label>
                    </div>
                </div>
            
                <div class="filter-section">
                    <div class="locations-header" id="locationsToggle">
                        Locations <span class="toggle-icon">▼</span>
                    </div>
                    <div class="locations-list" id="locationsList" style="display:none"></div>
                </div>
            
                <button id="applyFilters" class="apply-filters-btn">Apply Filters</button>
            </div>
            
        </header>

        <main>
            <div class="artists-grid">
                {{range .}}
                <div class="artist-card">
                    <a href="/artist?id={{.ID}}" class="artist-link">
                        <div class="image-container">
                            <img src="{{.Image}}" alt="{{.Name}}" loading="lazy">
                        </div>
                        <div class="artist-info">
                            <h2>{{.Name}}</h2>
                        </div>
                    </a>
                </div>
                {{end}}
            </div>
        </main>

        <footer>
            <p>© 2024 Groupie Tracker. All rights reserved.</p>
        </footer>
    </div>

    <script src="/static/js/main.js"></script>
    <script src="/static/js/search.js"></script>

    
</body>
</html>
